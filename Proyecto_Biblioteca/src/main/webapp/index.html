<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pantalla Inicial - I.E.D Los Santos</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
    }

    .header {
      background-color: #ff2d2d;
      padding: 80px;
      text-align: center;
      color: black;
      font-size: 28px;
      font-weight: bold;
    }

    .container {
      display: flex;
      flex-direction: row;
      height: calc(100vh - 120px);
      background-color: white;
    }

    .left {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    .left img {
      max-width: 80%;
      margin: 10px;
    }

    .right {
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: flex-start;
      padding: 40px;
      gap: 20px;
    }

    .button {
      display: flex;
      align-items: center;
      justify-content: flex-start;
      width: 300px;
      padding: 15px 20px;
      font-size: 18px;
      font-weight: bold;
      border: none;
      border-radius: 50px;
      cursor: pointer;
      transition: 0.3s;
    }

    .btn-registrar {
      background-color: white;
      border: 2px solid #000;
    }

    .btn-iniciar {
      background-color: #ff2d2d;
      color: white;
    }

    .button img {
      width: 30px;
      height: 30px;
      margin-right: 10px;
      border-radius: 50%;
      background: #ddd;
      padding: 3px;
    }

    .button:hover {
      opacity: 0.8;
    }
  </style>
</head>
<body>
  <div class="header">
    INSTITUCIÓN EDUCATIVA LOS SANTOS<br>
    DONDE SACAMOS A RELUCIR LAS MENTES MAESTRAS
  </div>

  <div class="container">
    <div class="left">
      <img src="caminando.png" alt="Estudiantes caminando">
    </div>

    <div class="right">
        <a href="registro.jsp" class="button btn-registrar">
        <img src="avatar.png" alt="icono usuario"> REGISTRARSE
        </a>

        <a href="inicio.jsp" class="button btn-iniciar">
        <img src="avatar.png" alt="icono usuario"> INICIAR SESIÓN
        </a>
 
    </div>
  </div>
</body>
</html>
